# UD16 - Mini project: change urgente catalogo prodotti
# La pipeline aggiorna risorse ACR/ACA già esistenti.
# Non crea Resource Group, ACR, Container Apps Environment o Container Apps.

trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

variables:
  azureServiceConnection: 'sc-obs-azure-rg'
  resourceGroupName: 'NOME_RESOURCE_GROUP'
  acrName: 'NOME_ACR'

  backendContainerAppName: 'NOME_ACA_BACKEND'
  frontendContainerAppName: 'NOME_ACA_FRONTEND'

  backendImageName: 'backend'
  frontendImageName: 'frontend'

  backendPort: '8000'
  frontendPort: '8000'

  # Percorso relativo alla radice del repository Azure DevOps.
  sourceRoot: 'work/UD16/release-products'

  # BuildId rende il tag diverso a ogni esecuzione.
  imageTag: '1.1.$(Build.BuildId)'
  revisionSuffix: 'p$(Build.BuildId)'

stages:
- stage: Validate
  displayName: Validate existing Azure resources and source
  jobs:
  - job: Validate
    displayName: Validate change prerequisites
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Validate ACR, ACA and source directories
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          fail() {
            echo "##vso[task.logissue type=error]$1"
            exit 1
          }

          check_value() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" || "$value" == NOME_* || "$value" == INSERIRE_* ]]; then
              fail "Valorizzare la variabile ${name}. Valore corrente: ${value}"
            fi
          }

          check_value resourceGroupName "$(resourceGroupName)"
          check_value acrName "$(acrName)"
          check_value backendContainerAppName "$(backendContainerAppName)"
          check_value frontendContainerAppName "$(frontendContainerAppName)"

          [[ -f "$(sourceRoot)/backend/Dockerfile" ]] || fail "Dockerfile backend non trovato in $(sourceRoot)/backend"
          [[ -f "$(sourceRoot)/frontend/Dockerfile" ]] || fail "Dockerfile frontend non trovato in $(sourceRoot)/frontend"

          az account show --query '{subscription:name,tenant:tenantId}' --output table
          az group show --name "$(resourceGroupName)" --output none
          az acr show --name "$(acrName)" --resource-group "$(resourceGroupName)" --output none
          az containerapp show --name "$(backendContainerAppName)" --resource-group "$(resourceGroupName)" --output none
          az containerapp show --name "$(frontendContainerAppName)" --resource-group "$(resourceGroupName)" --output none

          BACKEND_ENV_ID=$(az containerapp show \
            --name "$(backendContainerAppName)" \
            --resource-group "$(resourceGroupName)" \
            --query properties.managedEnvironmentId -o tsv)

          FRONTEND_ENV_ID=$(az containerapp show \
            --name "$(frontendContainerAppName)" \
            --resource-group "$(resourceGroupName)" \
            --query properties.managedEnvironmentId -o tsv)

          [[ "$BACKEND_ENV_ID" == "$FRONTEND_ENV_ID" ]] || fail "Frontend e backend non appartengono allo stesso Container Apps Environment."

          echo "Prerequisiti verificati."
          echo "Tag release: $(imageTag)"

- stage: BuildAndPush
  displayName: Build and push product images to ACR
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: Build
    displayName: ACR remote build
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Build backend and frontend in ACR
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          echo "Build backend: $(backendImageName):$(imageTag)"
          az acr build \
            --registry "$(acrName)" \
            --image "$(backendImageName):$(imageTag)" \
            --file "$(sourceRoot)/backend/Dockerfile" \
            "$(sourceRoot)/backend"

          echo "Build frontend: $(frontendImageName):$(imageTag)"
          az acr build \
            --registry "$(acrName)" \
            --image "$(frontendImageName):$(imageTag)" \
            --file "$(sourceRoot)/frontend/Dockerfile" \
            "$(sourceRoot)/frontend"

          echo "Tag backend disponibili:"
          az acr repository show-tags \
            --name "$(acrName)" \
            --repository "$(backendImageName)" \
            --orderby time_desc \
            --top 5 \
            --output table

          echo "Tag frontend disponibili:"
          az acr repository show-tags \
            --name "$(acrName)" \
            --repository "$(frontendImageName)" \
            --orderby time_desc \
            --top 5 \
            --output table

- stage: DeployBackend
  displayName: Update backend ACA revision
  dependsOn: BuildAndPush
  condition: succeeded()
  jobs:
  - job: Backend
    displayName: Deploy backend products release
    steps:
    - task: AzureCLI@2
      displayName: Update backend image and configuration
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          ACR_LOGIN_SERVER=$(az acr show \
            --name "$(acrName)" \
            --resource-group "$(resourceGroupName)" \
            --query loginServer -o tsv)

          BACKEND_IMAGE="${ACR_LOGIN_SERVER}/$(backendImageName):$(imageTag)"

          # Il backend resta raggiungibile solo dalle app nello stesso ACA Environment.
          az containerapp ingress update \
            --name "$(backendContainerAppName)" \
            --resource-group "$(resourceGroupName)" \
            --type internal \
            --target-port "$(backendPort)" \
            --transport auto \
            --output none

          az containerapp update \
            --name "$(backendContainerAppName)" \
            --resource-group "$(resourceGroupName)" \
            --image "$BACKEND_IMAGE" \
            --revision-suffix "$(revisionSuffix)" \
            --set-env-vars \
              SERVICE_NAME=backend \
              APP_ENV=aca \
              APP_VERSION="$(imageTag)" \
              PORT="$(backendPort)" \
            --output none

          az containerapp revision list \
            --name "$(backendContainerAppName)" \
            --resource-group "$(resourceGroupName)" \
            --query '[].{revision:name,active:properties.active,health:properties.healthState,image:properties.template.containers[0].image}' \
            --output table

- stage: DeployFrontend
  displayName: Update frontend ACA revision
  dependsOn: DeployBackend
  condition: succeeded()
  jobs:
  - job: Frontend
    displayName: Deploy frontend products release
    steps:
    - task: AzureCLI@2
      displayName: Update frontend image and BACKEND_URL
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          ACR_LOGIN_SERVER=$(az acr show \
            --name "$(acrName)" \
            --resource-group "$(resourceGroupName)" \
            --query loginServer -o tsv)

          BACKEND_FQDN=$(az containerapp show \
            --name "$(backendContainerAppName)" \
            --resource-group "$(resourceGroupName)" \
            --query properties.configuration.ingress.fqdn -o tsv)

          [[ -n "$BACKEND_FQDN" ]] || {
            echo "##vso[task.logissue type=error]FQDN backend non disponibile. Verificare ingress e provisioning."
            exit 1
          }

          FRONTEND_IMAGE="${ACR_LOGIN_SERVER}/$(frontendImageName):$(imageTag)"
          BACKEND_URL="https://${BACKEND_FQDN}"

          # Il frontend mantiene ingress pubblico.
          az containerapp ingress update \
            --name "$(frontendContainerAppName)" \
            --resource-group "$(resourceGroupName)" \
            --type external \
            --target-port "$(frontendPort)" \
            --transport auto \
            --output none

          az containerapp update \
            --name "$(frontendContainerAppName)" \
            --resource-group "$(resourceGroupName)" \
            --image "$FRONTEND_IMAGE" \
            --revision-suffix "$(revisionSuffix)" \
            --set-env-vars \
              SERVICE_NAME=frontend \
              APP_ENV=aca \
              APP_VERSION="$(imageTag)" \
              PORT="$(frontendPort)" \
              BACKEND_URL="$BACKEND_URL" \
            --output none

          echo "BACKEND_URL configurato: $BACKEND_URL"

          az containerapp revision list \
            --name "$(frontendContainerAppName)" \
            --resource-group "$(resourceGroupName)" \
            --query '[].{revision:name,active:properties.active,health:properties.healthState,image:properties.template.containers[0].image}' \
            --output table

- stage: Verify
  displayName: Verify products release
  dependsOn: DeployFrontend
  condition: succeeded()
  jobs:
  - job: SmokeTest
    displayName: Smoke test frontend and FE to BE path
    steps:
    - task: AzureCLI@2
      displayName: Verify public endpoints and deployed version
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          FRONTEND_FQDN=$(az containerapp show \
            --name "$(frontendContainerAppName)" \
            --resource-group "$(resourceGroupName)" \
            --query properties.configuration.ingress.fqdn -o tsv)

          FRONTEND_URL="https://${FRONTEND_FQDN}"
          echo "Frontend URL: $FRONTEND_URL"

          wait_for_url() {
            local url="$1"
            local label="$2"
            local output_file="$3"

            for attempt in $(seq 1 24); do
              if curl --fail --silent --show-error \
                --connect-timeout 5 \
                --max-time 15 \
                "$url" > "$output_file"; then
                echo "$label disponibile al tentativo $attempt."
                return 0
              fi
              echo "$label non ancora disponibile. Nuovo tentativo..."
              sleep 10
            done

            echo "##vso[task.logissue type=error]Timeout durante la verifica di $label: $url"
            return 1
          }

          wait_for_url "$FRONTEND_URL/health" "frontend health" /tmp/health.json
          wait_for_url "$FRONTEND_URL/ready" "frontend ready" /tmp/ready.json
          wait_for_url "$FRONTEND_URL/version" "frontend version" /tmp/version.json
          wait_for_url "$FRONTEND_URL/products" "catalogo JSON" /tmp/products.json
          wait_for_url "$FRONTEND_URL/" "pagina catalogo" /tmp/home.html

          grep -F "$(imageTag)" /tmp/version.json >/dev/null || {
            echo "##vso[task.logissue type=error]/version non contiene il tag atteso $(imageTag)."
            cat /tmp/version.json
            exit 1
          }

          grep -F 'notebook' /tmp/products.json >/dev/null || {
            echo "##vso[task.logissue type=error]Il catalogo JSON non contiene il prodotto notebook."
            cat /tmp/products.json
            exit 1
          }

          grep -F 'Catalogo prodotti' /tmp/home.html >/dev/null || {
            echo "##vso[task.logissue type=error]La home non contiene il catalogo atteso."
            head -100 /tmp/home.html
            exit 1
          }

          echo "Health:"
          cat /tmp/health.json
          echo
          echo "Ready:"
          cat /tmp/ready.json
          echo
          echo "Version:"
          cat /tmp/version.json
          echo
          echo "Change completata con release $(imageTag)."
